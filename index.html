<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Pro</title>
    <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3/dist/bwip-js-min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f8; }
        #video { width: 100%; max-width: 400px; border-radius: 10px; display: none; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #1d6aff; color: white; border: none; border-radius: 8px; font-weight: bold; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; font-size: 24px; padding: 10px; margin: 10px 0; border: 2px solid #1d6aff; border-radius: 8px; text-align: center; }
        #qr-output canvas { margin-top: 20px; max-width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Scanner QR/DataMatrix</h2>
        <video id="video" playsinline></video>
        <button id="start-btn" class="btn" onclick="startScan()">▶ Start Camera</button>
        
        <div id="edit-zone" style="display:none">
            <p>Original: <span id="old-data" style="font-size:10px; color:gray"></span></p>
            <label>New Qty:</label>
            <input type="number" id="qty-input" oninput="generate()">
            <div id="qr-output"></div>
            <button class="btn" style="background:#10b981" onclick="download()">💾 Save Image</button>
        </div>
    </div>

    <script>
        let reader = new ZXing.BrowserMultiFormatReader();
        let rawText = "";

        async function startScan() {
            document.getElementById('video').style.display = 'block';
            document.getElementById('start-btn').style.display = 'none';
            reader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result) {
                    rawText = result.text;
                    reader.reset();
                    document.getElementById('video').style.display = 'none';
                    document.getElementById('edit-zone').style.display = 'block';
                    document.getElementById('old-data').innerText = rawText;
                    let m = rawText.match(/Q(\d+)/);
                    if (m) document.getElementById('qty-input').value = m[1];
                    generate();
                }
            });
        }

        function generate() {
            let q = document.getElementById('qty-input').value;
            let modified = rawText.replace(/Q\d+/, "Q" + q);
            let out = document.getElementById('qr-output');
            out.innerHTML = "";
            bwipjs.toCanvas(document.createElement('canvas'), {
                bcid: 'datamatrix', text: modified, scale: 5
            }, (err, cvs) => { if (!err) out.appendChild(cvs); });
        }

        function download() {
            let cvs = document.querySelector('canvas');
            let a = document.createElement('a');
            a.download = "code.png"; a.href = cvs.toDataURL(); a.click();
        }
    </script>
</body>
</html>
