<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QR Quantité Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1d6aff">
<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bwip-js@3/dist/bwip-js-min.js"></script>
<style>
  body { font-family: sans-serif; background: #f0f4f8; padding: 15px; margin: 0; }
  .card { background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; overflow: hidden; }
  .header { background: #1d6aff; color: white; padding: 15px; font-weight: bold; text-align: center; }
  #live-view { width: 100%; aspect-ratio: 1/1; background: #000; display: none; position: relative; }
  video { width: 100%; height: 100%; object-fit: cover; }
  .btn { display: block; width: calc(100% - 30px); margin: 15px; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; }
  .btn-blue { background: #1d6aff; color: white; }
  .btn-green { background: #10b981; color: white; }
  .btn-outline { background: transparent; border: 2px solid #ccc; color: #666; }
  .result-area { padding: 15px; }
  .raw-data { background: #eee; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; word-break: break-all; margin: 10px 0; }
  .input-qty { width: 100%; font-size: 30px; text-align: center; padding: 10px; border: 2px solid #1d6aff; border-radius: 10px; margin: 10px 0; box-sizing: border-box; }
  .gs-char { background: #d1fae5; color: #065f46; padding: 0 2px; border-radius: 3px; }
  #qr-result { text-align: center; padding: 15px; }
</style>
</head>
<body>

<div class="card">
  <div class="header">SCANNER DATA MATRIX</div>
  <div id="live-view"><video id="video" playsinline></video></div>
  <button id="btn-start" class="btn btn-blue" onclick="startScan()">▶ Démarrer la Caméra</button>
  <button id="btn-stop" class="btn btn-outline" onclick="stopScan()" style="display:none">⏹ Arrêter</button>
</div>

<div class="card" id="edit-screen" style="display:none">
  <div class="header">MODIFICATION QUANTITÉ</div>
  <div class="result-area">
    <div style="font-size: 12px; color: #666;">Code Original :</div>
    <div id="raw-display" class="raw-data"></div>
    
    <label style="font-weight: bold;">Nouvelle Quantité (Q) :</label>
    <input type="number" id="qty-input" class="input-qty" oninput="updateCode()">
    
    <div id="qr-result"></div>
    <button class="btn btn-green" onclick="downloadQR()">💾 Enregistrer l'image</button>
    <button class="btn btn-outline" onclick="location.reload()">🔄 Nouveau Scan</button>
  </div>
</div>

<script>
  let codeReader = new ZXing.BrowserMultiFormatReader();
  let originalRaw = "";
  let stream = null;

  async function startScan() {
    document.getElementById('live-view').style.display = 'block';
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';

    codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
      if (result) {
        originalRaw = result.text;
        stopScan();
        showEdit();
      }
    });
  }

  function stopScan() {
    codeReader.reset();
    document.getElementById('live-view').style.display = 'none';
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-stop').style.display = 'none';
  }

  function showEdit() {
    document.getElementById('edit-screen').style.display = 'block';
    
    // Affichage propre des caractères GS
    let display = originalRaw.split(String.fromCharCode(29)).join('<span class="gs-char">GS</span>');
    document.getElementById('raw-display').innerHTML = display;

    // Détection auto du Q actuel
    let m = originalRaw.match(/Q(\d+)/);
    if (m) document.getElementById('qty-input').value = m[1];
    
    updateCode();
  }

  function updateCode() {
    let newQty = document.getElementById('qty-input').value;
    // On remplace Q[chiffres] par Q[nouveau] tout en gardant le reste (GS, etc.)
    let modified = originalRaw.replace(/Q\d+/, "Q" + newQty);
    
    let out = document.getElementById('qr-result');
    out.innerHTML = "";
    let canvas = document.createElement('canvas');
    bwipjs.toCanvas(canvas, {
      bcid: 'datamatrix',
      text: modified,
      scale: 4,
      padding: 10
    });
    out.appendChild(canvas);
  }

  function downloadQR() {
    let canvas = document.querySelector('#qr-result canvas');
    let a = document.createElement('a');
    a.download = 'nouveau_code.png';
    a.href = canvas.toDataURL();
    a.click();
  }
</script>

</body>
</html>
